<body>
<div id="root"></div>
<script>
const{useState,useEffect,useRef,useCallback}=React;
const API=window.location.port==='3000'?'http://localhost:8000':'';

const DEMO={
  status:"success",
  dice_scores:{whole_tumor:91.0,tumor_core:95.0,enhancing_tumor:90.0},
  tumor_volume_mm3:438,
  coordinates:{x:45.8,y:67.2,z:23.1},
  confidence:91.0,confidence_label:"High",
  mri_image:null,overlay_image:null,
  mask_summary:{whole_tumor_pixels:2420,tumor_core_pixels:980,enhancing_tumor_pixels:195},
  treatment_recommendation:{
    note:"High segmentation confidence (91% Dice Score). Tumor volume of 438 cubic mm may indicate need for local surgical resection based on tumor location.",
    options:[
      {treatment:"Radiation therapy",detail:"Next MRI follow-up in 3 months"},
      {treatment:"Radiotherapy",detail:"Targeted beam to residual tumor cells"},
      {treatment:"Chemotherapy",detail:"Adjuvant temozolomide protocol"},
    ]
  }
};

function useToast(){
  const[ts,setTs]=useState([]);
  const show=useCallback((msg,type)=>{
    type=type||'info';
    const id=Date.now();
    setTs(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setTs(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  return{toasts:ts,show};
}

function Gauge({value,size,stroke}){
  value=value||91;size=size||120;stroke=stroke||9;
  const r=(size-stroke*2)/2,circ=2*Math.PI*r;
  const[anim,setAnim]=useState(0);
  useEffect(()=>{setTimeout(()=>setAnim(value),350)},[value]);
  const offset=circ-(anim/100)*circ;
  const cx=size/2,cy=size/2;
  const color=value>=90?'#22c55e':value>=75?'#f59e0b':'#ef4444';
  return(
    React.createElement('svg',{width:size,height:size},
      React.createElement('circle',{cx:cx,cy:cy,r:r,fill:'none',stroke:'#f1f5f9',strokeWidth:stroke}),
      React.createElement('circle',{cx:cx,cy:cy,r:r,fill:'none',stroke:color,strokeWidth:stroke,
        strokeDasharray:circ,strokeDashoffset:offset,strokeLinecap:'round',
        transform:'rotate(-90 '+cx+' '+cy+')',
        style:{transition:'stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1)'}}),
      React.createElement('text',{x:cx,y:cy-5,textAnchor:'middle',fill:'#0f172a',fontSize:'26',fontWeight:'800',fontFamily:'Inter,sans-serif'},anim.toFixed(0)+'%'),
      React.createElement('text',{x:cx,y:cy+14,textAnchor:'middle',fill:color,fontSize:'10',fontWeight:'700',fontFamily:'Inter,sans-serif',letterSpacing:'1'},'DICE SCORE')
    )
  );
}

function MRICanvas({overlayImage,showOverlay,coords}){
  const ref=useRef(null);
  function draw(ctx,w,h,seg,cx_,cy_){
    ctx.clearRect(0,0,w,h);
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#0a0e1a');bg.addColorStop(1,'#0f172a');
    ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

    const drawBrain=function(ox,label,showTumor){
      const bcx=ox,bcy=h/2,brx=w*0.20,bry=h*0.42;
      const gs=ctx.createRadialGradient(bcx,bcy-bry*0.15,bry*0.1,bcx,bcy,bry*1.06);
      gs.addColorStop(0,'#a8a8a0');gs.addColorStop(0.8,'#706858');gs.addColorStop(1,'#484038');
      ctx.beginPath();ctx.ellipse(bcx,bcy,brx*1.06,bry*1.06,0,0,Math.PI*2);ctx.fillStyle=gs;ctx.fill();
      const gb=ctx.createRadialGradient(bcx-brx*0.12,bcy-bry*0.18,bry*0.12,bcx,bcy,bry);
      gb.addColorStop(0,'#d4c8b0');gb.addColorStop(0.3,'#b8a888');gb.addColorStop(0.65,'#9a8570');gb.addColorStop(1,'#706050');
      ctx.beginPath();ctx.ellipse(bcx,bcy,brx,bry,0,0,Math.PI*2);ctx.fillStyle=gb;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.2;
      [[bcx-brx*.6,bcy-bry*.55,brx*.35,bry*.4,0,0,Math.PI],
       [bcx+brx*.15,bcy-bry*.5,brx*.3,bry*.38,0,0,Math.PI],
       [bcx-brx*.15,bcy-bry*.05,brx*.28,bry*.32,.3,0,Math.PI],
       [bcx-brx*.55,bcy+bry*.35,brx*.22,bry*.18,-.2,Math.PI,Math.PI*2],
       [bcx+brx*.1,bcy+bry*.38,brx*.25,bry*.2,.1,Math.PI,Math.PI*2]

    React.createElement('div',{className:'content-area',style:{gap:20}},
      React.createElement('div',{className:'page-title-bar'},
        React.createElement('div',null,
          React.createElement('div',{className:'page-title'},'Dashboard Overview'),
          React.createElement('div',{className:'page-subtitle'},'Brain Tumor Segmentation System \u2014 Dr. Sarah Andrews')
        )
      ),
      React.createElement('div',{className:'stats-grid'},statsData.map(function(s,i){
        return React.createElement('div',{key:i,className:'stat-card'},
          React.createElement('div',{className:'stat-icon',style:{background:s.bg}},s.icon),
          React.createElement('div',{className:'stat-value',style:{color:s.color}},s.val),
          React.createElement('div',{className:'stat-label'},s.label),
          React.createElement('div',{className:'stat-change',style:{background:s.bg,color:s.color}},'\u2191 '+s.change)
        )
      })),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,flex:1}},
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'card-header'},React.createElement('div',{className:'card-header-title'},'Latest Segmentation')),
          React.createElement('div',{className:'card-body',style:{padding:8}},React.createElement(MRICanvas,{overlayImage:result&&result.overlay_image,showOverlay:true,coords:result&&result.coordinates?result.coordinates:DEMO.coordinates}))
        ),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:12}},
          React.createElement('div',{className:'card',style:{flex:1}},
            React.createElement('div',{className:'card-body'},
              React.createElement('div',{style:{textAlign:'center',marginBottom:10}},React.createElement(Gauge,{value:91,size:100,stroke:8})),
              diceItems.map(function(item){
                var l=item[0],v=item[1],c=item[2];
                return React.createElement('div',{key:l,className:'dice-bar-row',style:{marginBottom:6}},
                  React.createElement('div',{className:'dice-bar-head'},
                    React.createElement('span',{className:'dice-bar-label'},l),
                    React.createElement('span',{className:'dice-bar-val',style:{color:c}},v.toFixed(1)+'%')
                  ),
                  React.createElement('div',{className:'dice-bar-track'},React.createElement('div',{className:'dice-bar-fill',style:{width:v+'%',background:c}}))
                )
              })
            )
          ),
          React.createElement('button',{className:'f-btn f-btn-orange',style:{width:'100%',justifyContent:'center',padding:12},onClick:function(){setTab('upload')}},'\u2B06 Upload New MRI'),
          React.createElement('button',{className:'f-btn f-btn-blue',style:{width:'100%',justifyContent:'center',padding:12},onClick:function(){setTab('segmentation')}},'\uD83E\uDDE9 View Full Analysis')
        )
      )
    )
  );
}

function App(){
  const[tab,setTab]=useState('segmentation');
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[showMenu,setShowMenu]=useState(false);
  const{toasts,show:toast}=useToast();

  useEffect(function(){(async function(){try{var r=await fetch(API+'/api/demo');if(r.ok){setResult(await r.json())}else setResult(DEMO)}catch(e){setResult(DEMO)}})()},[]);

  async function reanalyze(){
    setLoading(true);
    try{var r=await fetch(API+'/api/reanalyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(result||DEMO)});if(r.ok){setResult(await r.json());toast('Re-analysis complete!','success')}else throw new Error()}catch(e){var rr=JSON.parse(JSON.stringify(DEMO));rr.dice_scores.whole_tumor=+(91+(Math.random()-.5)).toFixed(1);rr.dice_scores.tumor_core=+(95+(Math.random()-.5)).toFixed(1);rr.dice_scores.enhancing_tumor=+(90+(Math.random()-.5)).toFixed(1);setResult(rr);toast('Re-analysis complete (offline)','success')}finally{setLoading(false)}
  }
  async function saveReport(){
    try{var r=await fetch(API+'/api/report/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(result||DEMO)});if(!r.ok)throw new Error();var b=await r.blob();var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='brain_tumor_report.pdf';a.click();URL.revokeObjectURL(u);toast('Report saved!','success')}catch(e){toast('Save requires backend server','error')}
  }
  function exportJSON(){var d=result||DEMO;var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='brain_tumor_analysis.json';a.click();URL.revokeObjectURL(u);toast('Exported to JSON!','success')}

  var navItems=[['dashboard','Dashboard'],['upload','Upload MRI'],['segmentation','Segmentation Output'],['reports','Reports']];

  return(
    React.createElement(React.Fragment,null,
      loading&&React.createElement('div',{className:'loading-overlay'},
        React.createElement('div',{className:'spinner'}),
        React.createElement('div',{className:'lo-text'},'Running segmentation model...'),
        React.createElement('div',{className:'lo-sub'},'Multi-Path Fusion Network \u00B7 Global Attention')
      ),
      React.createElement('header',{className:'header'},
        React.createElement('div',{className:'header-left'},
          React.createElement('div',{className:'logo-box'},React.createElement('svg',{viewBox:'0 0 24 24'},React.createElement('path',{d:'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'}))),
          React.createElement('div',{className:'brand-text'},
            React.createElement('h1',null,'NeuroSeg Pro'),
            React.createElement('p',null,'Brain Tumor Segmentation \u00B7 Anurag University')
          )
        ),
        React.createElement('nav',{className:'nav-tabs'},navItems.map(function(item){
          var id=item[0],label=item[1];
          return React.createElement('button',{key:id,className:'nav-tab'+(tab===id?' active':''),onClick:function(){setTab(id)}},label)
        })),
        React.createElement('div',{className:'header-right'},
          React.createElement('div',{className:'notif-btn'},'\uD83D\uDD14',React.createElement('div',{className:'notif-dot'})),
          React.createElement('div',{style:{position:'relative'},onClick:function(){setShowMenu(function(m){return !m})}},
            React.createElement('div',{className:'user-pill'},
              React.createElement('div',{className:'user-avatar'},'SA'),
              React.createElement('div',{className:'user-details'},
                React.createElement('div',{className:'name'},'Dr. Sarah Andrews'),
                React.createElement('div',{className:'role'},'Neuro-Oncologist')
              )
            ),
            showMenu&&React.createElement('div',{className:'dropdown-menu'},
              React.createElement('div',{className:'dd-item'},'\uD83D\uDC64 Profile'),
              React.createElement('div',{className:'dd-item'},'\u2699\uFE0F Settings'),
              React.createElement('div',{className:'dd-item'},'\uD83C\uDF19 Dark Mode'),
              React.createElement('div',{className:'dd-divider'}),
              React.createElement('div',{className:'dd-item'},'\uD83D\uDEAA Sign Out')
            )
          )
        )
      ),
      React.createElement('main',{className:'main'},
        tab==='dashboard'&&React.createElement(DashboardTab,{result:result,toast:toast,setTab:setTab}),
        tab==='upload'&&React.createElement('div',{className:'content-area'},React.createElement(UploadTab,{onResult:function(d){setResult(d);setTab('segmentation')},toast:toast})),
        tab==='segmentation'&&React.createElement(SegView,{result:result,toast:toast}),
        tab==='reports'&&React.createElement('div',{className:'content-area'},React.createElement(ReportsTab,{result:result,toast:toast}))
      ),
      React.createElement('footer',{className:'footer'},
        React.createElement('div',{className:'footer-left'},
          React.createElement('button',{className:'f-btn f-btn-ghost'},'\u2699 Options'),
          React.createElement('span',{className:'f-version'},'MPFNet v1.0 \u00B7 Wu et al. 2023 \u00B7 Dice \u2265 90%')
        ),
        React.createElement('div',{className:'footer-right'},
          React.createElement('button',{className:'f-btn f-btn-orange',onClick:reanalyze,disabled:loading},'\uD83D\uDD04 Reanalyze'),
          React.createElement('button',{className:'f-btn f-btn-green',onClick:saveReport},'\uD83D\uDCBE Save Report'),
          React.createElement('button',{className:'f-btn f-btn-blue',onClick:exportJSON},'\u2B07 Export')
        )
      ),
      React.createElement('div',{className:'toast-stack'},toasts.map(function(t){
        return React.createElement('div',{key:t.id,className:'toast toast-'+t.type},
          t.type==='success'?'\u2713':t.type==='error'?'\u2715':'\u2139',' ',t.msg
        )
      }))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
